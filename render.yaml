# The server adapts to the box automatically. On the free plan it runs light
# follower scrapes (small cap) that survive 512MB. To get FULL, reliable
# follower-list scraping: upgrade this service to the Starter plan (2GB) in the
# Render dashboard AND set V8_HEAP_MB=512 — the code then switches to the
# aggressive path (bigger cap, longer budget, CSS kept). Leave V8_HEAP_MB unset
# (or 192) while on free.
services:
  - type: web
    name: x-search
    runtime: docker
    plan: free
    envVars:
      - key: X_AUTH_TOKEN
        sync: false
      - key: X_CT0
        sync: false
      - key: X_AUTH_MULTI
        sync: false
      - key: X_TWID
        sync: false
      # Set to 512 ONLY after upgrading to Starter (2GB). Unset/192 on free.
      - key: V8_HEAP_MB
        sync: false

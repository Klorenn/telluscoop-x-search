# Follower-list scraping is tuned for the Starter plan (2GB): the follower
# SPA OOM-kills a 512MB free instance. Set plan: starter in the Render
# dashboard. If you must stay on free, also set V8_HEAP_MB=192 and drop the
# scrape count (the follower-list endpoint will be flaky either way).
services:
  - type: web
    name: x-search
    runtime: docker
    plan: starter
    envVars:
      - key: X_AUTH_TOKEN
        sync: false
      - key: X_CT0
        sync: false
      - key: X_AUTH_MULTI
        sync: false
      - key: X_TWID
        sync: false
      # Chromium V8 heap (MB). 512 on Starter/2GB; drop to 192 on free/512MB.
      - key: V8_HEAP_MB
        value: "512"
